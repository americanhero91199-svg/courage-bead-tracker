kind = "mobile"
previewPath = "/mobile/"
title = "Courage Bead Tracker"
version = "1.0.0"
id = "artifacts/courage-bead-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24067

[services.development]
run = "pnpm --filter @workspace/courage-bead-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/courage-bead-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/courage-bead-mobile", "run", "serve" ]

[services.env]
PORT = "24067"
BASE_PATH = "/mobile/"
