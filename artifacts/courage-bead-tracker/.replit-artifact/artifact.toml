kind = "web"
previewPath = "/"
title = "Courage Bead Tracker"
version = "1.0.0"
id = "artifacts/courage-bead-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21150

[services.development]
run = "pnpm --filter @workspace/courage-bead-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/courage-bead-tracker", "run", "build" ]
publicDir = "artifacts/courage-bead-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21150"
BASE_PATH = "/"
